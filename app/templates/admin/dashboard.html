{% extends "base.html" %}
{% block title %}管理后台 - 校园活动管理平台{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>管理后台</h3>
    <a href="{{ url_for('admin.create_activity') }}" class="btn btn-primary">创建活动</a>
</div>

<div class="row">
    <div class="col-md-3 mb-4">
        <div class="card text-center shadow-sm border-warning">
            <div class="card-body">
                <h2 class="text-warning">{{ pending_count }}</h2>
                <p class="mb-0">待审核活动</p>
            </div>
            <a href="{{ url_for('admin.review_list') }}" class="card-footer text-decoration-none">去审核</a>
        </div>
    </div>
    <div class="col-md-3 mb-4">
        <div class="card text-center shadow-sm border-success">
            <div class="card-body">
                <h2 class="text-success">{{ approved_count }}</h2>
                <p class="mb-0">已发布活动</p>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-4">
        <div class="card text-center shadow-sm border-primary">
            <div class="card-body">
                <h2 class="text-primary">{{ user_count }}</h2>
                <p class="mb-0">注册用户</p>
            </div>
            <a href="{{ url_for('admin.user_list') }}" class="card-footer text-decoration-none">管理用户</a>
        </div>
    </div>
    <div class="col-md-3 mb-4">
        <div class="card text-center shadow-sm border-info">
            <div class="card-body">
                <h2 class="text-info">{{ registration_count }}</h2>
                <p class="mb-0">总报名数</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
